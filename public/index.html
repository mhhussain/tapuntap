<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>tapuntap</title>
  <link rel="stylesheet" href="/css/app.css">
</head>
<body>
  <div class="app" id="root-wrap">
    <nav class="rail" id="rail">
      <div class="rail-logo" title="tapuntap">t</div>
      <button class="rail-btn" data-route="home" data-tip="Home">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a1 1 0 0 1-1 1H4a1 1 0 0 1-1-1z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
      </button>
      <button class="rail-btn" data-route="decks" data-tip="Deck Library">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="4" y="4" width="4" height="16"/><rect x="10" y="4" width="4" height="16"/><rect x="16" y="6" width="4" height="14"/></svg>
      </button>
      <button class="rail-btn" data-route="games" data-tip="Games">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="M12 3v18M3 12h18"/></svg>
      </button>
      <button class="rail-btn" data-route="gameplay" data-tip="Active Game">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><polygon points="6,4 20,12 6,20" fill="currentColor" stroke="none"/></svg>
      </button>
      <div class="rail-spacer"></div>
      <button class="rail-btn" data-route="settings" data-tip="Settings">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M12 1v4M12 19v4M4.2 4.2l2.8 2.8M17 17l2.8 2.8M1 12h4M19 12h4M4.2 19.8l2.8-2.8M17 7l2.8-2.8"/></svg>
      </button>
    </nav>

    <div class="main" id="app">
      <div class="empty-state" style="flex:1;display:flex">
        <div class="empty-icon"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="12" r="9"/></svg></div>
        <div class="empty-title">Loading…</div>
      </div>
    </div>
  </div>

  <div id="modal-overlay" class="modal-backdrop hidden">
    <div id="modal-box" class="modal" style="min-width:480px">
      <div class="modal-header">
        <div class="modal-title" id="modal-title"></div>
        <button class="btn btn-ghost btn-icon" id="modal-close">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><path d="M6 6l12 12M18 6L6 18"/></svg>
        </button>
      </div>
      <div class="modal-body" id="modal-content"></div>
      <div class="modal-footer hidden" id="modal-footer"></div>
    </div>
  </div>

  <div id="toast-container"></div>

  <script type="module" src="/js/app.js"></script>
</body>
</html>
